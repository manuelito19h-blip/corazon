<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0a0010;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Georgia;
  overflow:hidden;
}

/* BOTÓN */
#heartBtn{
  background:none;
  border:none;
  width:250px;
  height:250px;
}

/* CORAZÓN SVG */
#heartBtn svg{
  width:100%;
  height:100%;
  transition:.2s;
}

/* TEXTO */
#msgTop,#msgBot{
  color:transparent;
  text-align:center;
  transition:1s;
}

#msgTop.show{color:pink;}
#msgBot.show{color:white;}

#hint{
  color:pink;
  text-align:center;
  margin-top:10px;
}

/* 💥 CORAZONES VISIBLES */
.heart{
  position:fixed;
  font-size:24px;
  animation:subir 2s linear forwards;
  z-index:999;
}

@keyframes subir{
  0%{
    transform:translateY(0);
    opacity:1;
  }
  100%{
    transform:translateY(-200px);
    opacity:0;
  }
}
</style>
</head>

<body>

<div>

<div id="msgTop">Hay algo que quiero decirte... ✨</div>

<button id="heartBtn" onclick="onTap()">

<svg viewBox="0 0 100 90">
<defs>
<radialGradient id="hg">
<stop offset="0%" stop-color="#ffb8d9" id="g0"/>
<stop offset="50%" stop-color="#ff2d7a" id="g1"/>
</radialGradient>
</defs>

<path d="M50 85 C20 65 5 50 5 33 C5 18 17 8 30 8 C38 8 45 13 50 20 C55 13 62 8 70 8 C83 8 95 18 95 33 C95 50 80 65 50 85Z"
fill="url(#hg)"/>
</svg>

</button>

<div id="hint">✦ toca el corazón ✦</div>

<div id="msgBot">
Cada vez que pienso en ti,<br>
mi corazón hace esto 💕
</div>

</div>

<script>
let tapped=false;

function crearCorazones(x,y){
  for(let i=0;i<12;i++){

    let c=document.createElement("div");
    c.className="heart";
    c.innerHTML="💖";

    // POSICIÓN (IMPORTANTE PARA IPHONE)
    c.style.left=(x + (Math.random()*80-40))+"px";
    c.style.top=(y + (Math.random()*40))+"px";

    document.body.appendChild(c);

    setTimeout(()=>{
      c.remove();
    },2000);
  }
}

function onTap(){

  let btn=document.getElementById("heartBtn");
  let rect=btn.getBoundingClientRect();

  let x=rect.left + rect.width/2;
  let y=rect.top + rect.height/2;

  // 💥 CREA CORAZONES
  crearCorazones(x,y);

  // 💓 ANIMACIÓN
  btn.style.transform="scale(1.3)";
  setTimeout(()=>btn.style.transform="scale(1)",200);

  // 🎨 COLOR
  document.getElementById("g0").setAttribute("stop-color","#fff");
  document.getElementById("g1").setAttribute("stop-color","#ff69b4");

  setTimeout(()=>{
    document.getElementById("g0").setAttribute("stop-color","#ffb8d9");
    document.getElementById("g1").setAttribute("stop-color","#ff2d7a");
  },300);

  // TEXTO
  if(!tapped){
    tapped=true;
    document.getElementById("hint").style.display="none";
    document.getElementById("msgTop").classList.add("show");
    document.getElementById("msgBot").classList.add("show");
  }
}
</script>

</body>
</html>
