<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ✨</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0a0010;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Georgia;
}

/* 🔥 BOTÓN (clave para iPhone) */
#heartBtn{
  background:none;
  border:none;
  outline:none;
  width:260px;
  height:260px;
}

#heartBtn svg{
  width:100%;
  height:100%;
  transition:.2s;
}

#msgTop,#msgBot{
  color:transparent;
  text-align:center;
  transition:1s;
}

#msgTop.show{color:pink;}
#msgBot.show{color:white;}

#hint{
  color:pink;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div>

<div id="msgTop">Hay algo que quiero decirte... ✨</div>

<!-- 🔥 BOTÓN -->
<button id="heartBtn" onclick="onTap()">

<svg viewBox="0 0 100 90">
<defs>
<radialGradient id="hg">
<stop offset="0%" stop-color="#ffb8d9" id="g0"/>
<stop offset="50%" stop-color="#ff2d7a" id="g1"/>
</radialGradient>
</defs>

<path d="M50 85 C20 65 5 50 5 33 C5 18 17 8 30 8 C38 8 45 13 50 20 C55 13 62 8 70 8 C83 8 95 18 95 33 C95 50 80 65 50 85Z"
fill="url(#hg)"/>
</svg>

</button>

<div id="hint">✦ toca el corazón ✦</div>

<div id="msgBot">
Cada vez que pienso en ti,<br>
mi corazón hace esto 💕
</div>

</div>

<script>
let tapped=false;

function onTap(){

  const btn=document.getElementById("heartBtn");
  const msgTop=document.getElementById("msgTop");
  const msgBot=document.getElementById("msgBot");
  const hint=document.getElementById("hint");
  const g0=document.getElementById("g0");
  const g1=document.getElementById("g1");

  // Animación
  btn.style.transform="scale(1.3)";
  setTimeout(()=>btn.style.transform="scale(1)",200);

  // Color
  g0.setAttribute("stop-color","#fff");
  g1.setAttribute("stop-color","#ff69b4");

  setTimeout(()=>{
    g0.setAttribute("stop-color","#ffb8d9");
    g1.setAttribute("stop-color","#ff2d7a");
  },300);

  // Mostrar texto
  if(!tapped){
    tapped=true;
    hint.style.display="none";
    msgTop.classList.add("show");
    msgBot.classList.add("show");
  }
}
</script>

</body>
</html>
