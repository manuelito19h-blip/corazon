<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Para ti ✨</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0010;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  #scene {
    width: 100vw; height: 100vh;
    background: #0a0010;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    cursor: pointer;
  }
  #starsCanvas { position:absolute; inset:0; pointer-events:none; }
  #confCanvas  { position:absolute; inset:0; pointer-events:none; z-index:4; }

  #msgTop {
    font-size: clamp(15px,5vw,24px);
    color: rgba(255,190,220,0);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 10px;
    z-index: 5;
    transition: color 1.2s, text-shadow 1.2s;
    padding: 0 20px;
  }
  #msgTop.show {
    color: rgba(255,190,220,0.95);
    text-shadow: 0 0 18px rgba(255,100,170,0.8);
  }

  #heartBox {
    position: relative; z-index: 5;
    width: clamp(200px, 55vw, 280px);
    height: clamp(200px, 55vw, 280px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #heartBox svg {
    width: 100%; height: 100%;
    animation: hfloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 22px rgba(255,60,140,0.75));
    overflow: visible;
  }
  @keyframes hfloat {
    0%,100%{ transform: translateY(0) scale(1); }
    50%    { transform: translateY(-12px) scale(1.03); }
  }
  .pulse-ring {
    position: absolute; inset: -14px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,70,150,0.2) 0%, transparent 70%);
    animation: pring 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pring {
    0%,100%{ transform:scale(1); opacity:.7; }
    50%    { transform:scale(1.25); opacity:1; }
  }

  #hint {
    font-size: clamp(11px,3vw,14px);
    color: rgba(255,170,210,0.75);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 12px; z-index: 5;
    animation: hblink 2s ease-in-out infinite;
  }
  @keyframes hblink { 0%,100%{opacity:.4;} 50%{opacity:1;} }
  #hint.hide { opacity:0!important; transition:opacity .5s; }

  #msgBot {
    font-size: clamp(14px,4.5vw,21px);
    color: rgba(255,215,235,0);
    text-align: center;
    margin-top: 14px; max-width: 85vw;
    line-height: 1.8; z-index: 5;
    transition: color 1.4s ease .3s, text-shadow 1.4s ease .3s;
    padding: 0 16px;
  }
  #msgBot.show {
    color: rgba(255,215,235,0.95);
    text-shadow: 0 0 14px rgba(255,130,190,.6);
  }

  .sparkdot {
    position: absolute; border-radius: 50%; background: white;
    pointer-events: none;
    animation: sdot 1.8s ease-in-out infinite; z-index: 4;
  }
  @keyframes sdot { 0%,100%{transform:scale(0);opacity:0;} 50%{transform:scale(1);opacity:1;} }
  @keyframes cfa {
    0%  { transform:scale(0) translateY(0);   opacity:1; }
    100%{ transform:scale(2) translateY(-20px); opacity:0; }
  }
</style>
</head>
<body>
<div id="scene">
  <canvas id="starsCanvas"></canvas>
  <canvas id="confCanvas"></canvas>

  <div id="msgTop">Hay algo que quiero decirte... ✨</div>

  <div id="heartBox">
    <div class="pulse-ring"></div>
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="38%" cy="30%" r="70%">
          <stop offset="0%"   stop-color="#ffb8d9" id="g0"/>
          <stop offset="45%"  stop-color="#ff2d7a" id="g1"/>
          <stop offset="100%" stop-color="#a8004e"/>
        </radialGradient>
      </defs>
      <path d="M50 85 C20 65 5 50 5 33 C5 18 17 8 30 8 C38 8 45 13 50 20 C55 13 62 8 70 8 C83 8 95 18 95 33 C95 50 80 65 50 85Z"
        fill="rgba(140,0,60,.3)" transform="translate(2,5)"/>
      <path d="M50 85 C20 65 5 50 5 33 C5 18 17 8 30 8 C38 8 45 13 50 20 C55 13 62 8 70 8 C83 8 95 18 95 33 C95 50 80 65 50 85Z"
        fill="url(#hg)"/>
      <ellipse cx="33" cy="27" rx="13" ry="8" fill="white" opacity=".2" transform="rotate(-30,33,27)"/>
      <ellipse cx="29" cy="23" rx="5"  ry="3" fill="white" opacity=".4" transform="rotate(-30,29,23)"/>
    </svg>
    <div class="sparkdot" style="width:7px;height:7px;top:12%;left:16%;animation-delay:0s;"></div>
    <div class="sparkdot" style="width:5px;height:5px;top:9%;left:63%;animation-delay:.55s;"></div>
    <div class="sparkdot" style="width:6px;height:6px;top:38%;left:84%;animation-delay:1.1s;"></div>
    <div class="sparkdot" style="width:4px;height:4px;top:68%;left:9%;animation-delay:1.6s;"></div>
    <div class="sparkdot" style="width:5px;height:5px;top:74%;left:76%;animation-delay:.85s;"></div>
  </div>

  <div id="hint">✦ toca el corazón ✦</div>
  <div id="msgBot">Cada vez que pienso en ti,<br>mi corazón hace exactamente esto... 💕</div>
</div>

<script>
(function(){
  const scene  = document.getElementById('scene');
  const sC     = document.getElementById('starsCanvas');
  const cC     = document.getElementById('confCanvas');
  const sX     = sC.getContext('2d');
  const cX     = cC.getContext('2d');
  const hBox   = document.getElementById('heartBox');
  const msgTop = document.getElementById('msgTop');
  const msgBot = document.getElementById('msgBot');
  const hint   = document.getElementById('hint');
  const hsvg   = hBox.querySelector('svg');

  function sz(){
    sC.width = cC.width = window.innerWidth;
    sC.height = cC.height = window.innerHeight;
  }
  sz();
  window.addEventListener('resize', sz);

  /* — Estrellas — */
  const STARS = Array.from({length:180},()=>({
    x:Math.random(), y:Math.random(),
    r:.2+Math.random()*1.4,
    a:Math.random(), da:(Math.random()-.5)*.014,
    h:285+Math.random()*90
  }));
  (function sloop(){
    sX.clearRect(0,0,sC.width,sC.height);
    for(const s of STARS){
      s.a+=s.da; if(s.a<=0||s.a>=1) s.da*=-1;
      sX.beginPath();
      sX.arc(s.x*sC.width, s.y*sC.height, s.r, 0, Math.PI*2);
      sX.fillStyle=`hsla(${s.h},80%,90%,${s.a})`;
      sX.fill();
    }
    requestAnimationFrame(sloop);
  })();

  /* — Mini corazones (piñata) — */
  const parts=[];
  let looping=false;

  function mheart(ctx,x,y,size,color,alpha,rot){
    ctx.save();
    ctx.translate(x,y); ctx.rotate(rot);
    ctx.globalAlpha=Math.max(0,alpha);
    const s=size/10;
    ctx.beginPath();
    ctx.moveTo(0,-s*2);
    ctx.bezierCurveTo( s*5,-s*8, s*10,-s*2, 0, s*5);
    ctx.bezierCurveTo(-s*10,-s*2,-s*5,-s*8, 0,-s*2);
    ctx.fillStyle=color;
    ctx.shadowColor=color; ctx.shadowBlur=8;
    ctx.fill();
    ctx.restore();
  }

  function ploop(){
    cX.clearRect(0,0,cC.width,cC.height);
    let alive=false;
    for(const p of parts){
      if(p.d>0){p.d--;alive=true;continue;}
      if(p.life<=0) continue;
      alive=true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.99;
      p.rot+=p.spin; p.life-=p.dec;
      mheart(cX,p.x,p.y,p.size,p.col,p.life,p.rot);
    }
    if(alive) requestAnimationFrame(ploop);
    else looping=false;
  }

  function pinata(cx,cy){
    const cols=['#ff3d8a','#ff6eb4','#ff9ed2','#ffcce8',
                '#ff2d55','#ff85c0','#c2006e','#ffb3d9',
                '#fff0f8','#ff4da6','#e91e8c','#ff6b9d'];
    for(let i=0;i<85;i++){
      const a=Math.random()*Math.PI*2;
      const sp=4+Math.random()*10;
      parts.push({
        x:cx, y:cy,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-Math.random()*5,
        g:.18+Math.random()*.13,
        size:9+Math.random()*20,
        spin:(Math.random()-.5)*.22,
        rot:Math.random()*Math.PI*2,
        col:cols[Math.floor(Math.random()*cols.length)],
        life:1, dec:.007+Math.random()*.013,
        d:Math.floor(Math.random()*10)
      });
    }
    if(!looping){looping=true;ploop();}
  }

  function flash(cx,cy){
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      const len=55+Math.random()*85;
      const g=cX.createLinearGradient(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);
      g.addColorStop(0,'rgba(255,200,230,.95)');
      g.addColorStop(1,'rgba(255,100,180,0)');
      cX.beginPath(); cX.moveTo(cx,cy);
      cX.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);
      cX.strokeStyle=g; cX.lineWidth=2.5; cX.stroke();
    }
    setTimeout(()=>cX.clearRect(0,0,cC.width,cC.height),200);
  }

  /* — Interacción — */
  let tapped=false;
  let lastTap=0;

  function onTap(e){
    e.preventDefault();
    e.stopPropagation();
    const now=Date.now();
    if(now-lastTap<300) return;
    lastTap=now;

    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    flash(cx,cy);
    pinata(cx,cy);

    hsvg.style.transition='transform .12s ease';
    hsvg.style.transform='scale(1.35)';
    setTimeout(()=>{ hsvg.style.transform='scale(1)'; },200);

    document.getElementById('g0').setAttribute('stop-color','#fff0f8');
    document.getElementById('g1').setAttribute('stop-color','#ff85c0');
    setTimeout(()=>{
      document.getElementById('g0').setAttribute('stop-color','#ffb8d9');
      document.getElementById('g1').setAttribute('stop-color','#ff2d7a');
    },280);

    if(!tapped){
      tapped=true;
      hint.classList.add('hide');
      setTimeout(()=>msgBot.classList.add('show'),350);
      setTimeout(()=>pinata(cx, cy+30),480);
    } else {
      pinata(cx+(Math.random()-.5)*110, cy+(Math.random()-.5)*80);
    }
  }

  hBox.addEventListener('touchstart', onTap, {passive:false});
  hBox.addEventListener('click', onTap);

  /* — Destellos al mover el dedo — */
  function chispa(x,y){
    if(Math.random()>.87){
      const d=document.createElement('div');
      const s=4+Math.random()*7;
      d.style.cssText=`position:fixed;left:${x-s/2}px;top:${y-s/2}px;`
        +`width:${s}px;height:${s}px;border-radius:50%;`
        +`background:hsl(${300+Math.random()*70},100%,85%);`
        +`pointer-events:none;z-index:50;animation:cfa .7s ease forwards;`;
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),700);
    }
  }

  document.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    chispa(t.clientX,t.clientY);
  },{passive:true});
  document.addEventListener('mousemove',e=>chispa(e.clientX,e.clientY));

  setTimeout(()=>msgTop.classList.add('show'),700);
})();
</script>
</body>
</html>
