<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ✨</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0a0010;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  font-family:'Georgia',serif;
}

#scene{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

#heartBox{
  width:260px;height:260px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

#heartBox svg{
  width:100%;height:100%;
  animation:float 3s infinite;
  transition:transform .2s;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

#msgTop,#msgBot{
  color:transparent;
  transition:1s;
  text-align:center;
}

#msgTop.show{color:pink;}
#msgBot.show{color:white;}

#hint{
  color:pink;
  margin-top:10px;
  animation:blink 2s infinite;
}

@keyframes blink{
  0%,100%{opacity:.3;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<div id="scene">

<div id="msgTop">Hay algo que quiero decirte... ✨</div>

<!-- 🔥 AQUÍ ESTÁ LA CLAVE PARA iPHONE -->
<div id="heartBox" onclick="onTap()">

<svg viewBox="0 0 100 90">
<defs>
<radialGradient id="hg">
<stop offset="0%" stop-color="#ffb8d9" id="g0"/>
<stop offset="50%" stop-color="#ff2d7a" id="g1"/>
</radialGradient>
</defs>

<path d="M50 85 C20 65 5 50 5 33 C5 18 17 8 30 8 C38 8 45 13 50 20 C55 13 62 8 70 8 C83 8 95 18 95 33 C95 50 80 65 50 85Z"
fill="url(#hg)"/>
</svg>

</div>

<div id="hint">✦ toca el corazón ✦</div>

<div id="msgBot">
Cada vez que pienso en ti,<br>
mi corazón hace esto 💕
</div>

</div>

<script>
let tapped=false;

function onTap(){

  const hBox=document.getElementById("heartBox");
  const msgTop=document.getElementById("msgTop");
  const msgBot=document.getElementById("msgBot");
  const hint=document.getElementById("hint");
  const g0=document.getElementById("g0");
  const g1=document.getElementById("g1");

  // 📳 Vibración (si el dispositivo lo permite)
  if(navigator.vibrate){
    navigator.vibrate(50);
  }

  // 💓 Animación
  hBox.style.transform="scale(1.3)";
  setTimeout(()=>hBox.style.transform="scale(1)",200);

  // 🎨 Cambio de color
  g0.setAttribute("stop-color","#ffffff");
  g1.setAttribute("stop-color","#ff69b4");

  setTimeout(()=>{
    g0.setAttribute("stop-color","#ffb8d9");
    g1.setAttribute("stop-color","#ff2d7a");
  },300);

  // 💬 Mostrar mensaje
  if(!tapped){
    tapped=true;
    hint.style.display="none";
    msgTop.classList.add("show");
    msgBot.classList.add("show");
  }
}
</script>

</body>
</html>
